<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xẻng Vàng - Đồ Dùng Nhà Bếp Cao Cấp</title>
  <!-- global app stylesheet is injected only for non-admin routes to avoid style conflicts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Link Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <div id="app"></div>
  <script>
    (function () {
      // Detect admin paths and avoid loading the main SPA and global script there.
      // Adjust detection if your admin pages sit under a different path.
      const p = location.pathname || '';
      const isAdmin = p.startsWith('/admin') || p.indexOf('/admin') !== -1 || p.startsWith('/admin/') || p.endsWith('/admin')
      // Always load the Vue app so SPA routes (including /admin) work.
      const m = document.createElement('script')
      m.type = 'module'
      m.src = '/src/main.js'
      document.body.appendChild(m)

      if (!isAdmin) {
        // inject global stylesheet for the storefront app (only on non-admin pages)
        try {
          const linkApp = document.createElement('link')
          linkApp.rel = 'stylesheet'
          linkApp.href = '/src/assets/style.css'
          document.head.appendChild(linkApp)
        } catch (e) {
          // ignore
        }

        const s = document.createElement('script')
        s.src = './src/assets/script.js'
        document.body.appendChild(s)
      } else {
        // For admin-only pages, load admin stylesheet to reduce FOUC/conflict.
        try {
          const link = document.createElement('link')
          link.rel = 'stylesheet'
          link.href = '/src/components/admin/admin-style.css'
          document.head.appendChild(link)
        } catch (e) {
          // ignore if admin CSS not available in this environment
        }
      }
    })()
  </script>
</body>

</html>
